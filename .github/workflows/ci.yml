name: CI

on:
  push:
    branches:
      - main
      
jobs:
  docker:
    runs-on: ubuntu-latest
  
    steps:
        - uses: actions/checkout@v4
  
        - name: Build Docker
          run: docker compose up 
        
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Node service tests
        run: |
          for d in api-gateway auth-service webhook-service frontend; do
            cd "$d"
            npm test
            cd -
          done

      - name: Run Python service tests
        run: |
          python -m pip install --upgrade pip
          for d in execution-service notification-service rule-service user-service; do
            cd "$d"
            python -m pip install .
            python -m unittest discover -s tests
            cd -
          done 

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .


  