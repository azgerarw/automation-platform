name: CI

on:
  push:
    branches:
      - main
      
jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: |
          for d in frontend api-gateway realtime-gateway webhook-service auth-service; do
            cd "$d"
            npm install
            cd ..
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies
        run: |
          for d in rule-service execution-service user-service notification-service; do
            cd "$d"
            poetry install --no-root
            cd ..
          done

      - name: Run linters
        run: |
          for d in frontend api-gateway realtime-gateway webhook-service auth-service; do
            cd "$d"
            npx biome check .
            cd ..
          done

          for d in rule-service execution-service user-service notification-service; do
            cd "$d"
            poetry run flake8 .
            cd ..
          done

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
  
  docker:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait services
        run: sleep 20

      - name: Show logs
        run: docker compose logs

      - name: Run Integration tests for JS services
        run: |
          docker compose exec -T api-gateway npm test
          docker compose exec -T realtime-gateway npm test
          docker compose exec -T webhook-service npm test
          docker compose exec -T auth-service npm test
          docker compose exec -T frontend npm test

      - name: Run integration tests for python services
        run: |
          docker compose exec -T rule-service python -m unittest discover -s tests
          docker compose exec -T execution-service python -m unittest discover -s tests
          docker compose exec -T user-service python -m unittest discover -s tests
          docker compose exec -T notification-service python -m unittest discover -s tests
      - name: Stop services
        if: always()
        run: docker compose down


  